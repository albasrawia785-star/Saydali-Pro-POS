name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          # فك ضغط الملف مع التعامل مع الاسم باللغة العربية
          unzip "pos.zip--صيدلي-برو" -d temp_unzip || unzip *.zip -d temp_unzip || true
          
          # البحث عن المجلد الذي يحتوي على package.json ونقل محتوياته للمجلد الرئيسي
          TARGET_DIR=$(find temp_unzip -name "package.json" -exec dirname {} \;)
          if [ -n "$TARGET_DIR" ]; then
            echo "Found project files in: $TARGET_DIR"
            cp -r $TARGET_DIR/* .
          else
            echo "Error: package.json not found in the zip file!"
            exit 1
          fi
          rm -rf temp_unzip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Application
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          npx cap sync android || npx cap add android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saydali-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
