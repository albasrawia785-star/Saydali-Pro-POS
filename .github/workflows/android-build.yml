name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          unzip "pos.zip--صيدلي-برو" -d temp_unzip || unzip *.zip -d temp_unzip || true
          TARGET_DIR=$(find temp_unzip -name "package.json" -exec dirname {} \;)
          if [ -n "$TARGET_DIR" ]; then
            echo "Found project files in: $TARGET_DIR"
            cp -r $TARGET_DIR/* .
          else
            echo "Error: package.json not found in the zip file!"
            exit 1
          fi
          rm -rf temp_unzip

      - name: Clean Old Build Artifacts
        run: |
          rm -rf node_modules package-lock.json dist android

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force

      - name: Build Web Application
        run: npm run build

      - name: Install Capacitor CLI & Core
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Initialize Capacitor Android
        run: |
          npx cap init "Saydali Pro POS" "com.saydalipro.pos" --web-dir=dist
          npx cap add android
          npx cap sync android

      - name: Update Kotlin & Gradle Versions for Java 21
        run: |
          # الانتقال لمجلد الأندرويد لضبط التوافقية
          cd android
          
          # تحديث إصدار الـ Kotlin في ملف build.gradle الرئيسي إلى إصدار حديث متوافق
          if [ -f "build.gradle" ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.20"/g' build.gradle
            sed -i 's/kotlin_version = .*/kotlin_version = "1.9.20"/g' build.gradle
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saydali-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Install Dependencies
        run: |
          npm install --force

      - name: Build Web Application
        run: npm run build

      - name: Install Capacitor CLI & Core
        run: |
